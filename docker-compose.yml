version: "3.9"

# Local development — hot-reload, no nginx
# Usage: docker compose up

services:
  backend:
    build:
      context: ./backend
      target: runtime
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    volumes:
      # Mount source for live reload in dev
      - ./backend/app:/app/app:ro
      # Shared temp dir for cloned repos
      - /tmp:/tmp
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      target: deps          # lightweight — use the node_modules layer only
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
    command: npm run dev
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
