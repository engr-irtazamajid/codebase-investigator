name: CD

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend

jobs:
  build-push-backend:
    name: Build & push backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-backend:
    name: Deploy backend (Railway)
    needs: build-push-backend
    runs-on: ubuntu-latest
    # Remove the `if` line once RAILWAY_TOKEN is added to GitHub secrets
    if: ${{ vars.RAILWAY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: railwayapp/railway-action@v0.2
        with:
          service: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # Frontend is deployed automatically by Vercel on push to main.
  # Connect your repo at vercel.com — no workflow step needed.
  # Set NEXT_PUBLIC_API_URL in Vercel's environment variable dashboard
  # to point at your Railway backend URL.
